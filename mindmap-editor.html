<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Минд мап</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;background:#0d0d10;color:#e0e0ec;font-family:system-ui,-apple-system,sans-serif;font-size:14px}

/* top bar */
#topbar{position:fixed;top:0;left:0;right:0;height:48px;z-index:10;display:flex;align-items:center;gap:10px;padding:0 16px;background:#0a0a0c;border-bottom:1px solid rgba(255,255,255,.07)}
#map-name{flex:1;text-align:center;font-size:15px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* action bar */
#actionbar{position:fixed;top:48px;left:0;right:0;height:44px;z-index:10;display:flex;align-items:center;gap:8px;padding:0 16px;background:#111116;border-bottom:1px solid rgba(255,255,255,.07)}
#sel-label{flex:1;font-size:12px;color:rgba(255,255,255,.38);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* buttons */
.btn{font-size:12px;padding:5px 12px;border-radius:7px;border:1px solid rgba(255,255,255,.12);cursor:pointer;background:transparent;color:rgba(255,255,255,.5);white-space:nowrap;font-family:inherit;transition:.12s}
.btn:disabled{opacity:.2;cursor:default;pointer-events:none}
.btn:not(:disabled):hover{color:#fff}
.btn-share{color:#a99ef8;background:rgba(127,110,245,.08);border-color:rgba(127,110,245,.28)}
.btn-share:not(:disabled):hover{background:rgba(127,110,245,.18)}
.btn-child{color:#a99ef8;background:rgba(127,110,245,.07);border-color:rgba(127,110,245,.25)}
.btn-child:not(:disabled):hover{background:rgba(127,110,245,.18)}
.btn-sib{color:#74b8ff;background:rgba(74,158,255,.07);border-color:rgba(74,158,255,.25)}
.btn-sib:not(:disabled):hover{background:rgba(74,158,255,.18)}
.btn-del{color:#f66;border-color:rgba(255,80,80,.22)}
.btn-del:not(:disabled):hover{background:rgba(255,80,80,.08)}

/* canvas */
#canvas{position:fixed;top:92px;left:0;right:0;bottom:0;overflow:auto;padding:40px}
#canvas::-webkit-scrollbar{width:5px;height:5px}
#canvas::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:3px}

/* --- CSS flexbox tree --- */

/* A branch = [node-box] [h-line + children-column] */
.branch{display:flex;align-items:center}

/* Horizontal connector from node to vertical line */
.h-line{width:24px;height:1.5px;background:rgba(255,255,255,.14);flex-shrink:0}

/* Vertical column of children, border-left = vertical line */
.children{display:flex;flex-direction:column;gap:10px;padding:8px 0;border-left:1.5px solid rgba(255,255,255,.14)}

/* Each child entry: horizontal connector via ::before + recursive branch */
.child-entry{display:flex;align-items:center;padding-left:24px;position:relative}
.child-entry::before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);width:24px;height:1.5px;background:rgba(255,255,255,.14)}

/* Node box */
.node{
  padding:8px 14px;border-radius:9px;
  border:1.5px solid rgba(255,255,255,.13);
  background:#1c1c26;
  cursor:pointer;user-select:none;
  font-size:13px;line-height:1.4;
  text-align:center;word-break:break-word;max-width:160px;
  transition:.1s;
}
.node:hover{border-color:rgba(255,255,255,.28)}
.node.sel{border-color:#7f6ef5;box-shadow:0 0 0 2px rgba(127,110,245,.3)}
.node.root{background:#7f6ef5;border-color:#7f6ef5;color:#fff;font-weight:600}
.node.root.sel{box-shadow:0 0 0 2px rgba(255,255,255,.4)}
/* inline edit input inherits node styles */
.node input{background:transparent;border:none;outline:none;color:inherit;font:inherit;text-align:center;width:100%;display:block;min-width:40px}

/* error screen */
#errscreen{display:none;position:fixed;inset:0;flex-direction:column;align-items:center;justify-content:center;gap:16px;background:#0d0d10;color:rgba(255,255,255,.4)}
#errscreen.show{display:flex}
</style>
</head>
<body>

<div id="topbar">
  <button class="btn" onclick="goBack()">← Назад</button>
  <span id="map-name"></span>
  <button class="btn btn-share" onclick="doShare()">Поделиться</button>
</div>

<div id="actionbar">
  <span id="sel-label">Выберите узел</span>
  <button class="btn btn-child" id="btn-child" onclick="addChild()"    disabled>+ Дочерний</button>
  <button class="btn btn-sib"   id="btn-sib"   onclick="addSibling()"  disabled>+ Соседний</button>
  <button class="btn btn-del"   id="btn-del"   onclick="delNode()"     disabled>− Удалить</button>
</div>

<div id="canvas"></div>

<div id="errscreen">
  <span id="err-msg">Карта не найдена</span>
  <button class="btn" style="font-size:13px;padding:8px 18px" onclick="location.href='index.html'">← К списку</button>
</div>

<script>
'use strict';
const LSKEY = 'pm_mindmap_v1';
let state = {maps:[]}, cur = null, sel = null;

const uid = () => Math.random().toString(36).slice(2, 9);

function loadState() {
  try { state = JSON.parse(localStorage.getItem(LSKEY)) || {maps:[]}; }
  catch(e) { state = {maps:[]}; }
}

function saveState() {
  if (cur) {
    const m = state.maps.find(x => x.id === cur.id);
    if (m) m.nodes = cur.nodes;
  }
  try { localStorage.setItem(LSKEY, JSON.stringify(state)); } catch(e) {}
}

// Build DOM subtree starting from nodeId
function buildBranch(nodeId) {
  const n = cur.nodes.find(x => x.id === nodeId);
  if (!n) return null;
  const kids = cur.nodes.filter(x => x.parentId === nodeId);

  const branch = document.createElement('div');
  branch.className = 'branch';

  const box = document.createElement('div');
  box.className = 'node' + (!n.parentId ? ' root' : '') + (nodeId === sel ? ' sel' : '');
  box.id = 'n-' + nodeId;
  box.textContent = n.text;
  box.onclick = e => { e.stopPropagation(); select(nodeId); };
  box.ondblclick = e => { e.stopPropagation(); startEdit(nodeId); };
  branch.appendChild(box);

  if (kids.length) {
    const hline = document.createElement('div');
    hline.className = 'h-line';
    branch.appendChild(hline);

    const col = document.createElement('div');
    col.className = 'children';
    kids.forEach(k => {
      const entry = document.createElement('div');
      entry.className = 'child-entry';
      entry.appendChild(buildBranch(k.id));
      col.appendChild(entry);
    });
    branch.appendChild(col);
  }

  return branch;
}

function render() {
  const canvas = document.getElementById('canvas');
  canvas.innerHTML = '';
  if (!cur) return;
  const root = cur.nodes.find(n => !n.parentId);
  if (root) canvas.appendChild(buildBranch(root.id));
  updateBar();
}

function select(id) {
  const prev = document.querySelector('.node.sel');
  if (prev) prev.classList.remove('sel');
  sel = id;
  if (id) {
    const el = document.getElementById('n-' + id);
    if (el) el.classList.add('sel');
  }
  updateBar();
}

function updateBar() {
  const n = sel ? cur.nodes.find(x => x.id === sel) : null;
  const hasp = !!(n && n.parentId);
  document.getElementById('sel-label').textContent = n ? '«' + n.text + '»' : 'Выберите узел';
  document.getElementById('btn-child').disabled = !n;
  document.getElementById('btn-sib').disabled   = !hasp;
  document.getElementById('btn-del').disabled   = !hasp;
}

function startEdit(id) {
  const box = document.getElementById('n-' + id);
  const n = cur.nodes.find(x => x.id === id);
  if (!box || !n) return;
  const prev = box.textContent;
  box.textContent = '';
  const inp = document.createElement('input');
  inp.value = prev;
  box.appendChild(inp);
  inp.focus(); inp.select();

  let committed = false;
  function commit() {
    if (committed) return; committed = true;
    const v = inp.value.trim();
    if (v) n.text = v;
    saveState(); render(); select(id);
  }
  inp.onblur = commit;
  inp.onkeydown = e => {
    if (e.key === 'Enter')  { e.preventDefault(); inp.blur(); }
    if (e.key === 'Escape') { committed = true; render(); select(id); }
  };
}

function addChild() {
  if (!cur || !sel) return;
  const id = uid();
  cur.nodes.push({id, text: 'Узел', parentId: sel});
  saveState(); render(); select(id);
  requestAnimationFrame(() => startEdit(id));
}

function addSibling() {
  if (!cur || !sel) return;
  const n = cur.nodes.find(x => x.id === sel);
  if (!n || !n.parentId) return;
  const id = uid();
  cur.nodes.push({id, text: 'Узел', parentId: n.parentId});
  saveState(); render(); select(id);
  requestAnimationFrame(() => startEdit(id));
}

function delNode() {
  if (!cur || !sel) return;
  const n = cur.nodes.find(x => x.id === sel);
  if (!n || !n.parentId) return;
  const subtree = id => [id, ...cur.nodes.filter(c => c.parentId === id).flatMap(c => subtree(c.id))];
  const del = new Set(subtree(sel));
  cur.nodes = cur.nodes.filter(x => !del.has(x.id));
  sel = null; saveState(); render();
}

document.getElementById('canvas').onclick = e => {
  if (e.target === e.currentTarget) { sel = null; render(); }
};

window.addChild   = addChild;
window.addSibling = addSibling;
window.delNode    = delNode;

window.goBack = () => { saveState(); window.close(); location.href = 'index.html'; };

window.doShare = () => {
  if (!cur) return;
  saveState();
  const map = state.maps.find(x => x.id === cur.id) || cur;
  const bid = uid() + uid();
  fetch('/api/save', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({key: 'mindmap_' + map.id, bid, data: map})
  })
  .then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); prompt('Ссылка:', location.origin + '/mindmap.html?id=' + map.id + '&bid=' + bid); })
  .catch(err => alert('Ошибка: ' + err.message));
};

// Boot
const mapId = new URLSearchParams(location.search).get('id');
if (!mapId) {
  document.getElementById('errscreen').classList.add('show');
} else {
  loadState();
  const map = state.maps.find(m => m.id === mapId);
  if (!map) {
    document.getElementById('err-msg').textContent = 'Карта не найдена (id: ' + mapId + ')';
    document.getElementById('errscreen').classList.add('show');
  } else {
    cur = JSON.parse(JSON.stringify(map));
    document.getElementById('map-name').textContent = cur.name;
    document.title = cur.name + ' — Минд мап';
    render();
    const root = cur.nodes.find(n => !n.parentId);
    if (root) select(root.id);
  }
}
</script>
</body>
</html>
