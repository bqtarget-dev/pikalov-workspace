<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Медиаплан</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0a0c;--bg2:#111116;--bg3:#18181f;--bg4:#1f1f28;--border:rgba(255,255,255,.07);--border2:rgba(255,255,255,.13);--accent:#7f6ef5;--accent2:#a99ef8;--green:#3ecf8e;--amber:#f5a623;--red:#f55656;--text:rgba(255,255,255,.92);--text2:rgba(255,255,255,.45);--text3:rgba(255,255,255,.22);}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;min-height:100vh;padding:36px 20px}
.page{max-width:720px;margin:0 auto}

.header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:30px;flex-wrap:wrap;gap:14px}
.header-left{}
.proj-name{font-family:'Bebas Neue',sans-serif;font-size:30px;letter-spacing:.05em;margin-bottom:5px}
.proj-date{font-size:11px;color:var(--text3)}
.print-btn{background:var(--bg3);color:var(--text2);border:.5px solid var(--border2);border-radius:8px;padding:9px 18px;font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;transition:all .15s;flex-shrink:0;align-self:flex-start}
.print-btn:hover{color:var(--text);border-color:var(--border)}

.mp-table{width:100%;border-collapse:collapse;margin-bottom:20px;border-radius:12px;overflow:hidden}
.mp-table th{font-size:9px;text-transform:uppercase;letter-spacing:.05em;color:var(--text3);padding:10px 14px;font-weight:400;text-align:right;background:var(--bg3);border-bottom:.5px solid var(--border2)}
.mp-table th:first-child{text-align:left}
.mp-table td{padding:10px 14px;font-size:13px;text-align:right;border-bottom:.5px solid var(--border)}
.mp-table td:first-child{text-align:left;font-weight:500;color:var(--text)}
.mp-table tbody tr:nth-child(odd) td{background:var(--bg2)}
.mp-table tbody tr:nth-child(even) td{background:var(--bg3)}
.mp-table tfoot td{padding:12px 14px;font-size:13px;font-weight:600;border-top:.5px solid var(--border2);background:rgba(127,110,245,.1);color:var(--accent2)}
.mp-table tfoot td:first-child{color:var(--text)}

.mp-summary{background:var(--bg2);border:.5px solid var(--border2);border-radius:12px;padding:16px 20px}
.mp-sum-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;font-size:14px;border-bottom:.5px solid var(--border)}
.mp-sum-row:last-child{border-bottom:none;padding-top:12px;margin-top:4px;font-weight:600;font-size:15px}
.mp-sum-lbl{color:var(--text2)}
.mp-sum-val{font-weight:500}

.error{text-align:center;padding:80px 20px;color:var(--text3);font-size:14px;line-height:1.8}
.cg{color:#3ecf8e}.cp{color:#a99ef8}.ca{color:#f5a623}.cr{color:#f55656}

@media print {
  body{background:#fff;color:#000;padding:16px}
  :root{--bg:#fff;--bg2:#fff;--bg3:#f7f7f8;--bg4:#eeeeee;--border:rgba(0,0,0,.08);--border2:rgba(0,0,0,.15);--text:rgba(0,0,0,.9);--text2:rgba(0,0,0,.55);--text3:rgba(0,0,0,.35)}
  .print-btn{display:none}
  .mp-table tfoot td{background:#eeeeee}
  .cg{color:#1a7a4a}.cp{color:#4a3eaa}.ca{color:#9a6010}.cr{color:#aa2222}
  .mp-summary{background:#f7f7f8;border-color:rgba(0,0,0,.12)}
}
</style>
</head>
<body>
<div class="page" id="page">
  <div class="error">Загрузка...</div>
</div>
<script>
function fmt(n) { return Number(n||0).toLocaleString('ru') + ' ₽'; }
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function fmtDate(s) {
  try { return new Date(s).toLocaleDateString('ru',{day:'2-digit',month:'long',year:'numeric'}); }
  catch(e) { return ''; }
}

function honorarCalc(p) {
  var fixed = p.honorarFixed !== undefined ? p.honorarFixed : (p.honorar || 0);
  var pct = p.honorarPct !== undefined ? p.honorarPct : (p.commissionPct || (p.commission ? 10 : 0));
  var amt = fixed > 0 ? fixed : (pct ? p.received * pct / 100 : 0);
  return { pct:pct, fixed:fixed, amt:amt };
}

function calc(p) {
  var insts = p.instruments || [];
  var plan  = insts.reduce(function(s,i){return s+i.plan;},0);
  var h = honorarCalc(p);
  var adBudget  = (p.budgetLimit > 0) ? p.budgetLimit : Math.max(0, p.received - h.amt);
  var totalBurn = insts.reduce(function(s,i){return s+Math.round(i.plan*(i.platformComm||0)/100);},0);
  var realAd    = adBudget - totalBurn;
  var remaining = adBudget - plan;
  return { plan:plan, honorarAmt:h.amt, adBudget:adBudget, totalBurn:totalBurn, realAd:realAd, remaining:remaining };
}

var params = new URLSearchParams(location.search);
var id = params.get('id');
var bid = params.get('bid') || '';
var showHonor = params.get('sh') !== '0';
var page = document.getElementById('page');

function renderProject(p) {
  var c = calc(p);
  var insts = (p.instruments || []).filter(function(i){ return i.plan > 0; });

  var rows = insts.map(function(inst){
    var burn  = Math.round(inst.plan * (inst.platformComm||0) / 100);
    var toKab = inst.plan - burn;
    var hasComm = (inst.platformComm||0) > 0;
    return '<tr>' +
      '<td>'+esc(inst.name)+'</td>' +
      '<td class="cp">'+fmt(inst.plan)+'</td>' +
      '<td style="color:var(--text3)">'+(hasComm ? inst.platformComm+'%' : '—')+'</td>' +
      '<td>'+(hasComm ? '<span class="ca">'+fmt(burn)+'</span>' : '<span style="color:var(--text3)">—</span>')+'</td>' +
      '<td>'+(hasComm ? '<span class="cg">'+fmt(toKab)+'</span>' : '<span class="cg">'+fmt(inst.plan)+'</span>')+'</td>' +
    '</tr>';
  }).join('') || '<tr><td colspan="5" style="color:var(--text3);text-align:center;padding:16px">Нет инструментов с бюджетом</td></tr>';

  var totalPlan = insts.reduce(function(s,i){return s+i.plan;},0);
  var totalBurn = insts.reduce(function(s,i){return s+Math.round(i.plan*(i.platformComm||0)/100);},0);

  var displayBudget = showHonor ? c.adBudget : p.received;
  var remaining = displayBudget - c.plan;

  var sumRows =
    '<div class="mp-sum-row"><span class="mp-sum-lbl">Получено от клиента</span><span class="mp-sum-val cg">'+fmt(p.received)+'</span></div>';
  if (showHonor && c.honorarAmt > 0) {
    sumRows += '<div class="mp-sum-row"><span class="mp-sum-lbl">Гонорар</span><span class="mp-sum-val ca">'+fmt(c.honorarAmt)+'</span></div>';
  }
  sumRows +=
    '<div class="mp-sum-row"><span class="mp-sum-lbl">Бюджет клиента</span><span class="mp-sum-val cp">'+fmt(displayBudget)+'</span></div>' +
    '<div class="mp-sum-row"><span class="mp-sum-lbl">Нераспределённый остаток</span><span class="mp-sum-val '+(remaining>=0?'ca':'cr')+'">'+fmt(remaining)+'</span></div>';

  page.innerHTML =
    '<div class="header">' +
      '<div class="header-left">' +
        '<div class="proj-name">'+esc(p.name)+'</div>' +
        '<div class="proj-date">Медиаплан · '+fmtDate(p.createdAt)+'</div>' +
      '</div>' +
      '<button class="print-btn" onclick="window.print()">🖨 Печать</button>' +
    '</div>' +
    '<table class="mp-table">' +
      '<thead><tr>' +
        '<th>Площадка</th>' +
        '<th>Бюджет</th>' +
        '<th>Комиссия площадки</th>' +
        '<th>Сумма площадки</th>' +
        '<th>Затраты по факту</th>' +
      '</tr></thead>' +
      '<tbody>'+rows+'</tbody>' +
      '<tfoot><tr>' +
        '<td>Итого</td>' +
        '<td>'+fmt(totalPlan)+'</td>' +
        '<td></td>' +
        '<td class="ca">'+fmt(totalBurn)+'</td>' +
        '<td class="cg">'+fmt(totalPlan-totalBurn)+'</td>' +
      '</tr></tfoot>' +
    '</table>' +
    '<div class="mp-summary">'+sumRows+'</div>';
}

if (!id) {
  page.innerHTML = '<div class="error">Идентификатор проекта не указан в ссылке.</div>';
} else {
  // Try server first, fall back to localStorage on same device
  fetch('/api/save?key=project_' + id + '&bid=' + bid)
    .then(function(res){ return res.json(); })
    .then(function(json){
      if (json.data) {
        renderProject(json.data);
      } else {
        throw new Error('not_found');
      }
    })
    .catch(function(){
      var raw = [];
      try { raw = JSON.parse(localStorage.getItem('pm_ws_v1') || '[]'); } catch(e) {}
      var p = raw.find(function(x){ return x.id === id; });
      if (p) {
        renderProject(p);
      } else {
        page.innerHTML = '<div class="error">Медиаплан не найден.<br>Попробуйте сформировать ссылку заново через кнопку «Поделиться».</div>';
      }
    });
}
</script>
</body>
</html>
