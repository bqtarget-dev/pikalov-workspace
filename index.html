<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PIKALOV MEDIA — Workspace</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0a0c;--bg2:#111116;--bg3:#18181f;--bg4:#1f1f28;--border:rgba(255,255,255,.07);--border2:rgba(255,255,255,.13);--accent:#7f6ef5;--accent2:#a99ef8;--green:#3ecf8e;--amber:#f5a623;--red:#f55656;--text:rgba(255,255,255,.92);--text2:rgba(255,255,255,.45);--text3:rgba(255,255,255,.22);}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;min-height:100vh}

/* NAV */
.nav{display:flex;align-items:center;justify-content:space-between;padding:12px 24px;border-bottom:.5px solid var(--border);background:var(--bg);position:sticky;top:0;z-index:100;flex-wrap:wrap;gap:8px}
.logo{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:.12em}
.logo em{color:var(--accent);font-style:normal}
.logo-tag{font-size:10px;color:var(--text3);letter-spacing:.08em;margin-left:8px;font-family:'DM Sans',sans-serif;vertical-align:middle}
.nav-tabs{display:flex;gap:4px}
.ntab{padding:7px 13px;border-radius:8px;border:.5px solid transparent;background:transparent;color:var(--text2);font-family:'DM Sans',sans-serif;font-size:12px;cursor:pointer;transition:all .15s;white-space:nowrap;pointer-events:auto}
.ntab.active{background:var(--bg3);color:var(--text);border-color:var(--border2)}
.ntab.soon{cursor:default;opacity:.35;pointer-events:none}

/* MAIN */
.main{max-width:1020px;margin:0 auto;padding:24px}

/* Summary */
.summary-bar{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;margin-bottom:20px}
.s-card{background:var(--bg2);border:.5px solid var(--border);border-radius:10px;padding:12px 14px}
.s-lbl{font-size:9px;text-transform:uppercase;letter-spacing:.07em;color:var(--text3);margin-bottom:5px}
.s-val{font-size:17px;font-weight:500}
.cg{color:var(--green)}.cp{color:var(--accent2)}.ca{color:var(--amber)}.cr{color:var(--red)}

/* Toolbar */
.toolbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px}
.ftabs{display:flex;gap:4px}
.ftab{padding:6px 12px;border-radius:7px;border:.5px solid var(--border);background:transparent;color:var(--text2);font-family:'DM Sans',sans-serif;font-size:12px;cursor:pointer;transition:all .15s}
.ftab.active{background:var(--bg3);color:var(--text);border-color:var(--border2)}
.add-btn{background:var(--accent);color:#fff;border:none;border-radius:8px;padding:8px 18px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:opacity .15s}
.add-btn:hover{opacity:.85}

/* Project card */
.proj-card{background:var(--bg2);border:.5px solid var(--border);border-radius:14px;margin-bottom:12px;overflow:hidden;transition:border-color .2s}
.proj-card:hover{border-color:var(--border2)}

.proj-head{display:flex;align-items:flex-start;justify-content:space-between;padding:16px 20px 0;gap:12px}
.proj-title{font-size:15px;font-weight:500}
.proj-meta{display:flex;gap:6px;margin-top:5px;flex-wrap:wrap;align-items:center}
.badge{font-size:10px;padding:2px 9px;border-radius:20px;border:.5px solid var(--border2);color:var(--text2);background:var(--bg4)}
.vk-id-badge{font-size:10px;color:var(--text3);font-family:monospace}
.status-pill{font-size:10px;padding:3px 9px;border-radius:20px;white-space:nowrap;flex-shrink:0}
.sp-active{background:rgba(62,207,142,.1);color:var(--green);border:.5px solid rgba(62,207,142,.25)}
.sp-done{background:rgba(255,255,255,.03);color:var(--text3);border:.5px solid var(--border)}
.sp-pause{background:rgba(245,166,35,.08);color:var(--amber);border:.5px solid rgba(245,166,35,.25)}

/* Progress */
.proj-progress{padding:12px 20px 0}
.progress-track{height:3px;background:var(--bg4);border-radius:2px;overflow:hidden}
.progress-fill{height:100%;border-radius:2px;transition:width .3s}
.progress-labels{display:flex;justify-content:space-between;font-size:10px;color:var(--text3);margin-top:4px}

/* Stats — 4 cols × 2 rows */
.proj-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;padding:10px 20px}
.ps{background:var(--bg4);border-radius:7px;padding:8px 6px;text-align:center}
.ps-lbl{font-size:8px;text-transform:uppercase;letter-spacing:.04em;color:var(--text3);margin-bottom:3px}
.ps-val{font-size:11px;font-weight:500}
.ps.accent{background:rgba(127,110,245,.13);border:.5px solid rgba(127,110,245,.28)}

/* Instruments */
.inst-section{border-top:.5px solid var(--border)}
.inst-toggle{display:flex;align-items:center;gap:6px;padding:9px 20px;font-size:11px;color:var(--text2);cursor:pointer;user-select:none;transition:color .15s}
.inst-toggle:hover{color:var(--text)}
.inst-body{display:none;padding:0 20px 14px;overflow-x:auto}
.inst-body.open{display:block}
.inst-table{width:100%;border-collapse:collapse;min-width:640px}
.inst-table th{font-size:9px;text-transform:uppercase;letter-spacing:.05em;color:var(--text3);padding:5px 6px;font-weight:400;text-align:right}
.inst-table th:first-child{text-align:left}
.inst-table td{padding:3px 6px;border-top:.5px solid var(--border);vertical-align:middle}
.i-name{font-size:12px;color:var(--text2);text-align:left}
.i-inp{background:var(--bg3);border:.5px solid var(--border2);border-radius:5px;padding:4px 7px;color:#fff;font-family:'DM Sans',sans-serif;font-size:12px;width:88px;text-align:right;outline:none;transition:border-color .15s}
.i-inp:focus{border-color:var(--accent)}
.i-inp.sm{width:58px}
.i-calc{font-size:11px;text-align:right}
.inst-foot td{font-size:11px;font-weight:500;padding:6px 6px;border-top:.5px solid var(--border2);text-align:right}
.inst-foot td:first-child{text-align:left;color:var(--text2)}
.add-i-btn{font-size:11px;color:var(--accent2);background:transparent;border:.5px solid rgba(127,110,245,.3);border-radius:6px;padding:4px 12px;cursor:pointer;margin-top:8px;transition:all .15s}
.add-i-btn:hover{background:rgba(127,110,245,.1)}

/* Transfers */
.transfers-section{padding:8px 20px 2px;border-top:.5px solid var(--border)}
.tr-head{font-size:9px;text-transform:uppercase;letter-spacing:.07em;color:var(--text3);margin-bottom:5px}
.tr-row{display:flex;gap:8px;align-items:center;font-size:11px;padding:3px 0;flex-wrap:wrap}
.tr-date{color:var(--text3);width:68px;flex-shrink:0}
.tr-amount{font-weight:500;width:100px;flex-shrink:0}
.tr-desc{color:var(--text2)}

/* Actions */
.proj-actions{display:flex;gap:7px;padding:10px 20px 14px;flex-wrap:wrap;border-top:.5px solid var(--border)}
.act{font-size:11px;border-radius:6px;padding:5px 11px;cursor:pointer;border:.5px solid;font-family:'DM Sans',sans-serif;transition:all .15s}
.a-edit{color:var(--text2);border-color:var(--border2);background:transparent}.a-edit:hover{color:var(--text);border-color:var(--border)}
.a-transfer{color:var(--accent2);border-color:rgba(127,110,245,.3);background:rgba(127,110,245,.07)}.a-transfer:hover{background:rgba(127,110,245,.15)}
.a-ok{color:var(--green);border-color:rgba(62,207,142,.3);background:rgba(62,207,142,.05)}.a-ok:hover{background:rgba(62,207,142,.12)}
.a-pause{color:var(--amber);border-color:rgba(245,166,35,.3);background:rgba(245,166,35,.05)}.a-pause:hover{background:rgba(245,166,35,.12)}
.a-del{color:var(--red);border-color:rgba(245,86,86,.2);background:transparent}.a-del:hover{background:rgba(245,86,86,.07)}

/* Empty / coming soon */
.empty{text-align:center;padding:48px;color:var(--text3);font-size:13px}
.coming-soon{text-align:center;padding:80px 20px;color:var(--text3)}
.cs-icon{font-size:36px;margin-bottom:12px}

/* Modal */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:200;display:none;align-items:flex-start;justify-content:center;padding:32px 16px;overflow-y:auto}
.overlay.open{display:flex}
.modal{background:var(--bg2);border:.5px solid var(--border2);border-radius:16px;padding:28px;width:100%;max-width:580px;margin:auto}
.modal-title{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:.06em;margin-bottom:18px}
.msection{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);margin:18px 0 10px;border-top:.5px solid var(--border);padding-top:14px}
.field{margin-bottom:12px}
.field label{display:block;font-size:10px;color:var(--text2);margin-bottom:5px;text-transform:uppercase;letter-spacing:.05em}
.field input,.field select{width:100%;background:var(--bg4);border:.5px solid var(--border2);border-radius:8px;padding:9px 12px;color:#fff;font-family:'DM Sans',sans-serif;font-size:13px;outline:none;transition:border-color .15s}
.field input:focus,.field select:focus{border-color:var(--accent)}
.field select option{background:#1f1f28}
.field input:disabled,.field input[readonly]{opacity:.6;cursor:default;border-style:dashed}
.mrow{display:flex;gap:10px}
.mrow .field{flex:1}
.check-row{display:flex;align-items:center;gap:8px;padding:6px 0}
.check-row input[type=checkbox]{width:16px;height:16px;accent-color:var(--accent);cursor:pointer;flex-shrink:0}
.check-row label{font-size:13px;color:var(--text);cursor:pointer}
.radio-group{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.radio-opt{display:inline-flex;align-items:center;gap:5px;cursor:pointer;font-size:12px;color:var(--text2);background:var(--bg4);border:.5px solid var(--border2);border-radius:6px;padding:6px 11px;transition:all .15s;user-select:none}
.radio-opt:has(input:checked){color:var(--text);border-color:var(--accent);background:rgba(127,110,245,.12)}
.radio-opt input[type=radio]{accent-color:var(--accent);width:13px;height:13px;flex-shrink:0}
.hint{font-size:10px;color:var(--text3);margin-top:4px;min-height:14px}
.auto-hint{color:var(--amber)}

/* Modal instruments */
.mi-table{width:100%;border-collapse:collapse;margin-bottom:8px}
.mi-table th{font-size:9px;text-transform:uppercase;letter-spacing:.05em;color:var(--text3);padding:5px 6px;font-weight:400;text-align:right}
.mi-table th:first-child{text-align:left}
.mi-table td{padding:3px 6px;border-top:.5px solid var(--border);vertical-align:middle}
.mi-name-inp{background:transparent;border:none;color:var(--text2);font-size:12px;width:150px;outline:none;font-family:'DM Sans',sans-serif;padding:2px 0}
.mi-name-inp:focus{color:var(--text);border-bottom:.5px solid var(--border2)}
.mi-num-inp{background:var(--bg4);border:.5px solid var(--border2);border-radius:5px;padding:4px 7px;color:#fff;font-family:'DM Sans',sans-serif;font-size:12px;width:80px;text-align:right;outline:none}
.mi-num-inp:focus{border-color:var(--accent)}
.mi-auto{font-size:11px;color:var(--text3);text-align:right;width:80px;display:inline-block}
.mi-del{background:transparent;border:none;color:var(--text3);cursor:pointer;font-size:13px;padding:2px 4px;transition:color .15s}
.mi-del:hover{color:var(--red)}

.modal-actions{display:flex;gap:10px;margin-top:20px}
.mbtn{flex:1;background:var(--accent);color:#fff;border:none;border-radius:8px;padding:10px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer}
.mcancel{background:transparent;color:var(--text2);border:.5px solid var(--border2);border-radius:8px;padding:10px 18px;font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;transition:all .15s}
.mcancel:hover{color:var(--text)}

/* Analytics */
.an-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:12px}
.an-title{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:.06em}
.an-filters{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.month-pick{background:var(--bg4);border:.5px solid var(--border2);border-radius:7px;padding:6px 10px;color:var(--text2);font-family:'DM Sans',sans-serif;font-size:12px;outline:none;cursor:pointer;color-scheme:dark}
.month-pick:focus{border-color:var(--accent)}
.an-big-cards{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}
.an-big-card{background:var(--bg2);border:.5px solid var(--border);border-radius:12px;padding:20px 22px}
.an-big-lbl{font-size:10px;text-transform:uppercase;letter-spacing:.07em;color:var(--text3);margin-bottom:8px}
.an-big-val{font-size:26px;font-weight:500;margin-bottom:4px}
.an-big-sub{font-size:11px;color:var(--text3)}
.an-table-wrap{background:var(--bg2);border:.5px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:20px}
.an-table{width:100%;border-collapse:collapse}
.an-table th{font-size:9px;text-transform:uppercase;letter-spacing:.05em;color:var(--text3);padding:10px 14px;font-weight:400;text-align:right;border-bottom:.5px solid var(--border)}
.an-table th:first-child{text-align:left}
.an-table td{padding:8px 14px;font-size:12px;text-align:right;border-top:.5px solid var(--border)}
.an-table td:first-child{text-align:left}
.an-table tbody tr:hover td{background:var(--bg3)}
.an-table tfoot td{font-size:11px;font-weight:500;padding:8px 14px;text-align:right;border-top:.5px solid var(--border2);color:var(--text2)}
.an-table tfoot td:first-child{text-align:left}
.chart-wrap{background:var(--bg2);border:.5px solid var(--border);border-radius:12px;padding:20px}
.chart-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.chart-ttl{font-size:10px;text-transform:uppercase;letter-spacing:.07em;color:var(--text3)}
.chart-legend{display:flex;gap:14px}
.chart-leg{display:inline-flex;align-items:center;gap:5px;font-size:11px;color:var(--text2)}
.chart-leg::before{content:'';width:10px;height:10px;border-radius:2px;flex-shrink:0}
.chart-leg.hon::before{background:var(--amber)}
.chart-leg.ad::before{background:var(--accent)}
.chart-body{display:flex;align-items:flex-end;gap:4px;height:160px;overflow-x:auto;padding-bottom:2px}
.chart-col{display:flex;flex-direction:column;align-items:center;flex-shrink:0;min-width:48px}
.chart-bars{display:flex;align-items:flex-end;gap:2px;height:136px;width:100%;padding:0 2px}
.chart-bar{flex:1;border-radius:3px 3px 0 0;min-height:2px;transition:height .3s}
.chart-bar.hon{background:var(--amber)}
.chart-bar.ad{background:var(--accent);opacity:.8}
.chart-lbl{font-size:8px;color:var(--text3);margin-top:4px;white-space:nowrap}

/* Mediaplan clickable stat cell */
.mp-link{cursor:pointer;transition:background .15s,border-color .15s;border:.5px solid transparent}
.mp-link:hover{background:rgba(127,110,245,.18)!important;border-color:rgba(127,110,245,.35)}
.mp-link .ps-lbl::after{content:' ↗';opacity:.45}

/* Mediaplan modal table */
.mp-table{width:100%;border-collapse:collapse;margin-bottom:16px}
.mp-table th{font-size:9px;text-transform:uppercase;letter-spacing:.05em;color:var(--text3);padding:9px 12px;font-weight:400;text-align:right;background:var(--bg3);border-bottom:.5px solid var(--border2)}
.mp-table th:first-child{text-align:left}
.mp-table td{padding:9px 12px;font-size:13px;text-align:right;border-bottom:.5px solid var(--border)}
.mp-table td:first-child{text-align:left;font-weight:500}
.mp-table tbody tr:nth-child(odd) td{background:var(--bg2)}
.mp-table tbody tr:nth-child(even) td{background:var(--bg3)}
.mp-table tbody tr:hover td{background:var(--bg4)}
.mp-table tfoot td{padding:10px 12px;font-size:12px;font-weight:600;border-top:.5px solid var(--border2);background:rgba(127,110,245,.1);color:var(--accent2)}
.mp-table tfoot td:first-child{color:var(--text)}
.mp-summary{background:var(--bg3);border:.5px solid var(--border2);border-radius:10px;padding:14px 16px;margin-top:4px}
.mp-sum-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;font-size:13px;border-bottom:.5px solid var(--border)}
.mp-sum-row:last-child{border-bottom:none;padding-top:10px;margin-top:4px;font-weight:600}
.mp-sum-lbl{color:var(--text2)}
.mp-share-btn{background:var(--bg4);color:var(--text2);border:.5px solid var(--border2);border-radius:8px;padding:10px 18px;font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;transition:all .15s}
.mp-share-btn:hover{color:var(--text);border-color:var(--border)}
.mp-copied{color:var(--green);font-size:11px;margin-left:8px;opacity:0;transition:opacity .3s}
.mp-copied.show{opacity:1}
.mp-comm-inp{background:var(--bg4);border:.5px solid var(--border2);border-radius:5px;padding:3px 6px;color:#fff;font-family:'DM Sans',sans-serif;font-size:12px;width:60px;text-align:right;outline:none;transition:border-color .15s}
.mp-comm-inp:focus{border-color:var(--accent)}

/* ── TEAM ──────────────────────────────────────────────────────────── */
.team-section-title{display:flex;align-items:center;justify-content:space-between;font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:.1em;color:var(--text2);margin:0 0 12px;padding-bottom:8px;border-bottom:.5px solid var(--border)}

/* Plan for day */
.plan-block{background:var(--bg2);border:.5px solid var(--border2);border-radius:14px;padding:18px 20px;margin-bottom:20px}
.plan-header{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px}
.plan-title{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:.08em}
.plan-date{font-size:11px;color:var(--text3);text-transform:capitalize}
.plan-goal{margin-bottom:14px}
.plan-goal-met{font-size:14px;color:var(--green);margin-bottom:6px;font-weight:500}
.plan-goal-fail{font-size:13px;color:var(--red);margin-bottom:6px}
.plan-goal-pending{font-size:13px;color:var(--amber);margin-bottom:6px}
.plan-progress-bar{height:4px;background:var(--bg4);border-radius:3px;overflow:hidden}
.plan-progress-fill{height:100%;background:var(--green);border-radius:3px;transition:width .3s}
.plan-tasks{display:flex;flex-direction:column;gap:5px;margin-top:10px}
.plan-task{display:flex;align-items:center;gap:8px;padding:7px 10px;background:var(--bg3);border-radius:8px;border:.5px solid var(--border)}
.plan-task.task-done{opacity:.55}
.plan-task-pri{font-size:13px;flex-shrink:0}
.plan-task-title{flex:1;font-size:13px;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.plan-task-time{font-size:11px;color:var(--accent2);flex-shrink:0}
.plan-task-status{font-size:10px;color:var(--text3);flex-shrink:0;min-width:52px;text-align:right}
.plan-task-done{background:transparent;border:.5px solid var(--border2);border-radius:5px;color:var(--text2);cursor:pointer;padding:2px 8px;font-size:11px;flex-shrink:0;transition:all .15s;font-family:'DM Sans',sans-serif}
.plan-task-done:hover{border-color:var(--green);color:var(--green)}

/* Member cards */
.member-cards{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
@media(max-width:760px){.member-cards{grid-template-columns:repeat(2,1fr)}}
@media(max-width:420px){.member-cards{grid-template-columns:1fr}}
.member-card{background:var(--bg2);border:.5px solid var(--border);border-radius:12px;padding:16px;display:flex;flex-direction:column;gap:8px;transition:border-color .2s}
.mc-online{border-left:2px solid var(--green)}
.mc-away{border-left:2px solid var(--red)}
.mc-top{display:flex;align-items:flex-start;justify-content:space-between}
.mc-name{font-size:15px;font-weight:500}
.mc-role{font-size:10px;color:var(--text3);margin-top:2px;text-transform:uppercase;letter-spacing:.05em}
.mc-status-dot{font-size:16px}
.mc-status-lbl{font-size:12px;color:var(--text2)}
.mc-time{font-size:10px;color:var(--text3)}
.mc-comment-inp{width:100%;background:var(--bg4);border:.5px solid var(--border2);border-radius:6px;padding:6px 9px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:11px;outline:none;transition:border-color .15s}
.mc-comment-inp:focus{border-color:var(--accent)}
.mc-comment-inp:disabled{opacity:.4;cursor:default}
.mc-toggle-btn{width:100%;padding:9px;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;border:none;transition:all .2s;margin-top:2px;text-align:center}
.mc-btn-away{background:rgba(245,86,86,.15);color:var(--red);border:.5px solid rgba(245,86,86,.3)!important}
.mc-btn-away:hover{background:rgba(245,86,86,.28)}
.mc-btn-online{background:rgba(62,207,142,.15);color:var(--green);border:.5px solid rgba(62,207,142,.3)!important}
.mc-btn-online:hover{background:rgba(62,207,142,.28)}

<script>
var DEFAULT_INST = [
  {name:'ВК таргет',         pc:0},
  {name:'YouTube',           pc:20},
  {name:'TikTok',            pc:0},
  {name:'Посевы ВК группы',  pc:0},
  {name:'Посевы ВК плейлисты',pc:0},
  {name:'Посевы Spotify',    pc:0},
  {name:'Посевы ЯМ',         pc:0},
  {name:'Шаблоны TikTok',    pc:0},
  {name:'Блогеры TikTok',    pc:0},
  {name:'Яндекс Директ',     pc:22}
];
var PLATFORM_COMM = {'YouTube':20,'Яндекс Директ':22};

var state = { projects:[], filter:'all' };
var currentTab = 'mediaplans';
var editingId = null;
var transferFromId = null;
var modalInsts = [];
var limitDirty = false;

// ── DATA ──────────────────────────────────────────────────────────────
function loadData() {
  try { var d = localStorage.getItem('pm_ws_v1'); if(d) state.projects = JSON.parse(d); } catch(e) {}
}
function saveData() { localStorage.setItem('pm_ws_v1', JSON.stringify(state.projects)); }

function makeInsts() {
  return DEFAULT_INST.map(function(t,i){
    return {id:'di'+i, name:t.name, plan:0, platformComm:t.pc, fact:0};
  });
}

// ── CALC ──────────────────────────────────────────────────────────────
function honorarCalc(p) {
  // backwards compat: honorarFixed|honorar, honorarPct|commissionPct|commission
  var fixed = p.honorarFixed !== undefined ? p.honorarFixed : (p.honorar || 0);
  var pct = p.honorarPct !== undefined ? p.honorarPct
    : (p.commissionPct || (p.commission ? 10 : 0));
  var amt = fixed > 0 ? fixed : (pct ? p.received * pct / 100 : 0);
  return {pct:pct, fixed:fixed, amt:amt};
}

function calc(p) {
  var insts = p.instruments || [];
  var plan  = insts.reduce(function(s,i){return s+i.plan;},0);
  var fact  = insts.reduce(function(s,i){return s+i.fact;},0);
  var h = honorarCalc(p);
  var adBudget = (p.budgetLimit > 0) ? p.budgetLimit : Math.max(0, p.received - h.amt);
  var totalBurn = insts.reduce(function(s,i){
    return s + Math.round(i.plan * (i.platformComm||0) / 100);
  },0);
  var realAd        = adBudget - totalBurn;
  var remaining     = adBudget - plan;      // Остаток = К расходу − Итого план
  var debt      = Math.max(0, adBudget - p.received);
  return {
    plan:plan, fact:fact,
    honorarAmt:h.amt, honorarPct:h.pct,
    adBudget:adBudget, totalBurn:totalBurn, realAd:realAd,
    remaining:remaining, debt:debt
  };
}

function fmt(n)  { return Number(n||0).toLocaleString('ru')+' ₽'; }
function fmtD(s) { return new Date(s).toLocaleDateString('ru',{day:'2-digit',month:'2-digit',year:'2-digit'}); }

// ── TABS ──────────────────────────────────────────────────────────────
function showTab(t) {
  currentTab = t;
  ['mediaplans','analytics','team','tasks','pomodoro'].forEach(function(k){
    document.getElementById('view-'+k).style.display = k===t?'':'none';
  });
  document.querySelectorAll('.ntab:not(.soon)').forEach(function(b,i){
    b.classList.toggle('active', i===['mediaplans','analytics','team','tasks','pomodoro'].indexOf(t));
  });
  if (t === 'analytics') renderAnalytics();
  if (t === 'team')      renderTeam();
}

// ── FILTER ────────────────────────────────────────────────────────────
function setFilter(f) {
  state.filter = f;
  ['all','active','pause','done'].forEach(function(k){
    document.getElementById('f-'+k).classList.toggle('active',k===f);
  });
  renderProjects(); renderSummary();
}

// ── RENDER ────────────────────────────────────────────────────────────
function render() {
  renderSummary(); renderProjects();
  if (currentTab === 'analytics') renderAnalytics();
}

function renderSummary() {
  var ps = state.projects;
  var t = ps.reduce(function(a,p){
    var c = calc(p);
    return {rec:a.rec+p.received, hon:a.hon+c.honorarAmt, ad:a.ad+c.adBudget,
            burn:a.burn+c.totalBurn, real:a.real+c.realAd, fact:a.fact+c.fact};
  },{rec:0,hon:0,ad:0,burn:0,real:0,fact:0});
  document.getElementById('summary-bar').innerHTML =
    sc('Проектов',       ps.length,   '') +
    sc('Получено',       fmt(t.rec),  'cg') +
    sc('Гонорары',           fmt(t.hon),  'ca') +
    sc('К расходу',          fmt(t.ad),   'cp') +
    sc('Комиссия площадки',  fmt(t.burn), 'cr') +
    sc('На рекламу',     fmt(t.real), 'cp');
}
function sc(l,v,cls){
  return '<div class="s-card"><div class="s-lbl">'+l+'</div><div class="s-val '+cls+'">'+v+'</div></div>';
}

function renderProjects() {
  var list = state.filter==='all' ? state.projects
    : state.projects.filter(function(p){return p.status===state.filter;});
  var el = document.getElementById('projects-list');
  el.innerHTML = list.length ? list.map(projCard).join('')
    : '<div class="empty">Проектов нет — создай первый выше</div>';
}

// ── PROJECT CARD ──────────────────────────────────────────────────────
function projCard(p) {
  var c = calc(p);
  var pct   = c.realAd > 0 ? Math.min(c.fact/c.realAd*100, 999) : 0;
  var fill  = pct<80 ? 'var(--green)' : pct<100 ? 'var(--amber)' : 'var(--red)';
  var spCls = {active:'sp-active',done:'sp-done',pause:'sp-pause'}[p.status];
  var spLbl = {active:'В работе',done:'Завершён',pause:'Пауза'}[p.status];
  var hLabel = c.honorarPct ? 'Гонорар '+c.honorarPct+'%' : (c.honorarAmt ? 'Гонорар' : '');

  var head = '<div class="proj-head"><div>' +
    '<div class="proj-title">'+esc(p.name)+'</div>' +
    '<div class="proj-meta">' +
      '<span class="badge">'+esc(p.clientType)+'</span>' +
      (p.vkCampaignId ? '<span class="vk-id-badge">VK '+esc(p.vkCampaignId)+'</span>' : '') +
      (hLabel ? '<span class="badge">'+hLabel+'</span>' : '') +
      '<span class="badge" style="color:var(--text3)">'+fmtD(p.createdAt)+'</span>' +
    '</div></div>' +
    '<span class="status-pill '+spCls+'">'+spLbl+'</span></div>';

  var progress = '<div class="proj-progress">' +
    '<div class="progress-track"><div class="progress-fill" style="width:'+Math.min(pct,100)+'%;background:'+fill+'"></div></div>' +
    '<div class="progress-labels"><span>'+pct.toFixed(1)+'% факт</span><span>'+fmt(c.fact)+' / '+fmt(c.realAd)+'</span></div>' +
    '</div>';

  var stats = '<div class="proj-stats" id="pstats-'+p.id+'">' + statsHtml(p,c) + '</div>';

  return '<div class="proj-card" id="pc-'+p.id+'">'+head+progress+stats+
    instSection(p)+transfersSection(p)+actionsHtml(p,c)+'</div>';
}

function statsHtml(p, c) {
  return ps('Получено',          fmt(p.received),  'cg') +
    ps('Гонорар',                fmt(c.honorarAmt),'ca') +
    ps('Бюджет клиента',         fmt(c.adBudget),  'cp') +
    '<div class="ps mp-link" onclick="openMediaplanModal(\''+p.id+'\')" title="Открыть медиаплан">' +
      '<div class="ps-lbl">Медиаплан клиента</div>' +
      '<div class="ps-val cp">'+fmt(c.plan)+'</div>' +
    '</div>' +
    ps('Комиссия площадок',      fmt(c.totalBurn), 'cr') +
    '<div class="ps accent"><div class="ps-lbl">На рекламу</div><div class="ps-val">'+fmt(c.realAd)+'</div></div>' +
    ps('Остаток',                fmt(c.remaining), c.remaining<0?'cr':'ca') +
    ps('Долг клиента',           c.debt>0?fmt(c.debt):'—', c.debt>0?'cr':'');
}
function ps(l,v,cls){
  return '<div class="ps"><div class="ps-lbl">'+l+'</div><div class="ps-val '+cls+'">'+v+'</div></div>';
}

// ── INSTRUMENTS TABLE (card) ──────────────────────────────────────────
function instRows(p) {
  return p.instruments.map(function(inst) {
    var burn  = Math.round(inst.plan * (inst.platformComm||0) / 100);
    var toKab = inst.plan - burn;
    var diff  = inst.plan - inst.fact;
    var hasBurn = inst.plan > 0 && inst.platformComm > 0;
    return '<tr>' +
      '<td class="i-name">'+esc(inst.name)+'</td>' +
      '<td style="text-align:right"><input class="i-inp" type="number" value="'+inst.plan
        +'" data-pid="'+p.id+'" data-iid="'+inst.id+'" data-f="plan" min="0"/></td>' +
      '<td style="text-align:right"><input class="i-inp sm" type="number" value="'+(inst.platformComm||0)

function getHonorarPct() {
  var v = 0;
  document.querySelectorAll('input[name="p-hpct"]').forEach(function(r){
    if (r.checked) v = parseInt(r.value)||0;
  });
  return v;
}

function autoLimit() {
  if (limitDirty) return;
  var received = parseFloat(document.getElementById('p-received').value)||0;
  var fixed    = parseFloat(document.getElementById('p-honorar-fixed').value)||0;
  var pct      = getHonorarPct();
  var amt      = fixed > 0 ? fixed : received * pct / 100;
  document.getElementById('p-limit').value = Math.max(0, Math.round(received - amt)) || '';
  document.getElementById('p-honorar-hint').textContent = amt > 0 ? 'Гонорар: ' + fmt(amt) : '';
}

function onReceivedChange()   { autoLimit(); }
function onHonorarPctChange() { autoLimit(); }
function onHonorarFixedInput() {
  var v = parseFloat(document.getElementById('p-honorar-fixed').value)||0;
  if (v > 0) document.getElementById('p-hp0').checked = true;
  autoLimit();
}

// ── SAVE PROJECT ──────────────────────────────────────────────────────
function saveProject() {
  var name = document.getElementById('p-name').value.trim();
  if (!name){ flash('p-name'); return; }
  var received     = parseFloat(document.getElementById('p-received').value)||0;
  var honorarFixed = parseFloat(document.getElementById('p-honorar-fixed').value)||0;
  var honorarPct   = honorarFixed > 0 ? 0 : getHonorarPct();
  var budgetLimit  = parseFloat(document.getElementById('p-limit').value)||0;
  var data = {
    name:        name,
    clientType:  document.getElementById('p-type').value,
    vkCampaignId:document.getElementById('p-vkid').value.trim(),
    status:      document.getElementById('p-status').value,
    received:    received,
    honorarPct:  honorarPct,
    honorarFixed:honorarFixed,
    budgetLimit: budgetLimit,
    instruments: modalInsts.map(function(i){return Object.assign({},i);})
  };
  if (editingId) {
    var p = state.projects.find(function(p){return p.id===editingId;});
    Object.assign(p, data);
  } else {
    data.id        = 'p'+Date.now();
    data.createdAt = new Date().toISOString();
    data.transfers = [];
    state.projects.unshift(data);
  }
  saveData(); closeProjModal(); render();
}

function doTransfer() {
  var toId    = document.getElementById('tr-to').value;
  var amount  = parseFloat(document.getElementById('tr-amount').value)||0;
  var comment = document.getElementById('tr-comment').value.trim();
  if (!toId || amount<=0){ if(amount<=0) flash('tr-amount'); return; }
  var from = state.projects.find(function(p){return p.id===transferFromId;});
  var to   = state.projects.find(function(p){return p.id===toId;});
  if (!from||!to) return;
  var date = new Date().toISOString();
  if (!from.transfers) from.transfers=[];
  if (!to.transfers)   to.transfers=[];
  var note = comment ? ': '+comment : '';
  from.transfers.push({direction:'out',date:date,amount:amount,description:'→ '+to.name+note});
  to.transfers.push({direction:'in', date:date,amount:amount,description:'← '+from.name+note});
  to.received += amount;
  saveData(); closeTransferModal(); render();
}

// ── ANALYTICS ─────────────────────────────────────────────────────────
var anFilter = 'all';
var anMonth  = '';

function getAnPeriod() {
  if (anMonth) {
    var parts = anMonth.split('-');
    var y = parseInt(parts[0]), mo = parseInt(parts[1])-1;
    return {from: new Date(y, mo, 1), to: new Date(y, mo+1, 1)};
  }
  var now = new Date();
  var from = null;
  if (anFilter === 'all') return {from: null, to: null};
  from = new Date(now);
  if      (anFilter === 'today') { from.setHours(0,0,0,0); }
  else if (anFilter === 'week')  { from.setDate(from.getDate()-7); }
  else if (anFilter === 'month') { from.setMonth(from.getMonth()-1); }
  else if (anFilter === '3m')    { from.setMonth(from.getMonth()-3); }
  return {from: from, to: now};
}

function projInPeriod(p, period) {
  if (!period.from) return true;
  var d = new Date(p.createdAt);
  return d >= period.from && (!period.to || d <= period.to);
}

function setAnFilter(f) {
  anFilter = f; anMonth = '';
  document.getElementById('an-month-pick').value = '';
  ['all','3m','month','week','today'].forEach(function(k){
    document.getElementById('an-'+k).classList.toggle('active', k===f);
  });
  renderAnalytics();
}
function setAnMonth(val) {
  anMonth = val; anFilter = '';
  ['all','3m','month','week','today'].forEach(function(k){
    document.getElementById('an-'+k).classList.remove('active');
  });
  renderAnalytics();
}

function renderAnalytics() {
  var period   = getAnPeriod();
  var filtered = state.projects.filter(function(p){ return projInPeriod(p, period); });

  // Big cards
  var totHon=0, totAd=0, totRec=0, totBurn=0, totReal=0, totFact=0;
  filtered.forEach(function(p){
    var c = calc(p);
    totRec  += p.received;
    totHon  += c.honorarAmt;
    totAd   += c.adBudget;
    totBurn += c.totalBurn;
    totReal += c.realAd;
    totFact += c.fact;
  });
  document.getElementById('an-big-cards').innerHTML =
    '<div class="an-big-card"><div class="an-big-lbl">Гонорары за период</div>' +
      '<div class="an-big-val ca">'+fmt(totHon)+'</div>' +
      '<div class="an-big-sub">'+filtered.length+' проект(ов) · получено '+fmt(totRec)+'</div></div>' +
    '<div class="an-big-card"><div class="an-big-lbl">Рекламные бюджеты за период</div>' +
      '<div class="an-big-val cp">'+fmt(totAd)+'</div>' +
      '<div class="an-big-sub">Комиссии площадок: '+fmt(totBurn)+' · На рекламу: '+fmt(totReal)+'</div></div>';

  // Table
  var rows = filtered.map(function(p){
    var c = calc(p);
    return '<tr>' +
      '<td>'+esc(p.name)+'</td>' +
      '<td class="cg">'+fmt(p.received)+'</td>' +
      '<td class="ca">'+fmt(c.honorarAmt)+'</td>' +
      '<td class="cp">'+fmt(c.adBudget)+'</td>' +
      '<td class="cr">'+fmt(c.totalBurn)+'</td>' +
      '<td style="color:var(--accent2)">'+fmt(c.realAd)+'</td>' +
    '</tr>';
  }).join('');
  var tfoot = '<tfoot><tr>' +
    '<td>Итого ('+filtered.length+')</td>' +
    '<td class="cg">'+fmt(totRec)+'</td>' +
    '<td class="ca">'+fmt(totHon)+'</td>' +
    '<td class="cp">'+fmt(totAd)+'</td>' +
    '<td class="cr">'+fmt(totBurn)+'</td>' +
    '<td style="color:var(--accent2)">'+fmt(totReal)+'</td>' +
  '</tr></tfoot>';
  document.getElementById('an-table-wrap').innerHTML = filtered.length
    ? '<table class="an-table"><thead><tr>' +
        '<th>Проект</th><th>Получено</th><th>Гонорар</th>' +
        '<th>Рекл. бюджет</th><th>Комиссия площ.</th><th>На рекламу</th>' +
      '</tr></thead><tbody>'+rows+'</tbody>'+tfoot+'</table>'
    : '<div class="empty">Нет проектов за выбранный период</div>';

  // Chart
  document.getElementById('an-chart-wrap').innerHTML = renderChart();
}

function getMonthlyData() {
  var now = new Date(), months = [];
  for (var i = 11; i >= 0; i--) {
    var d = new Date(now.getFullYear(), now.getMonth()-i, 1);
    months.push({key: d.getFullYear()+'-'+d.getMonth(), month: d.getMonth(), year: d.getFullYear(), hon:0, ad:0});
  }
  state.projects.forEach(function(p){
    var d = new Date(p.createdAt);
    var key = d.getFullYear()+'-'+d.getMonth();
    var m = months.find(function(x){return x.key===key;});
    if (!m) return;
    var c = calc(p);
    m.hon += c.honorarAmt;
    m.ad  += c.adBudget;
  });
  return months;
}

function renderChart() {
  var months = getMonthlyData();
  var maxVal = months.reduce(function(mx,m){return Math.max(mx,m.hon,m.ad);},0);
  if (!maxVal) return '';
  var RU = ['Янв','Фев','Мар','Апр','Май','Июн','Июл','Авг','Сен','Окт','Ноя','Дек'];
  var cols = months.map(function(m){
    var hp = Math.round(m.hon/maxVal*100), ap = Math.round(m.ad/maxVal*100);
    return '<div class="chart-col">' +
      '<div class="chart-bars">' +
        '<div class="chart-bar hon" style="height:'+hp+'%" title="Гонорар: '+fmt(m.hon)+'"></div>' +
        '<div class="chart-bar ad"  style="height:'+ap+'%" title="Рекл. бюджет: '+fmt(m.ad)+'"></div>' +
      '</div>' +
      '<div class="chart-lbl">'+RU[m.month]+' '+String(m.year).slice(2)+'</div>' +
    '</div>';
  }).join('');
  return '<div class="chart-wrap">' +
    '<div class="chart-top">' +
      '<div class="chart-ttl">По месяцам (последние 12)</div>' +
      '<div class="chart-legend">' +
        '<span class="chart-leg hon">Гонорары</span>' +
        '<span class="chart-leg ad">Рекл. бюджеты</span>' +
      '</div>' +
    '</div>' +
    '<div class="chart-body">'+cols+'</div>' +
  '</div>';
}

        '<th>Площадка</th><th>Бюджет</th><th>Комиссия площадки</th><th>Сумма площадки</th><th>Затраты по факту</th>' +
      '</tr></thead>' +
      '<tbody>'+rows+'</tbody>' +
      '<tfoot><tr>' +
        '<td>Итого</td>' +
        '<td>'+fmt(totalPlan2)+'</td>' +
        '<td></td>' +
        '<td class="ca">'+fmt(totalBurn2)+'</td>' +
        '<td class="cg">'+fmt(totalPlan2-totalBurn2)+'</td>' +
      '</tr></tfoot>' +
    '</table>';

  var displayBudget = showHonorar ? c.adBudget : p.received;
  var remaining = displayBudget - c.plan;
  var sumRows =
    '<div class="mp-sum-row"><span class="mp-sum-lbl">Получено от клиента</span><span class="mp-sum-val cg">'+fmt(p.received)+'</span></div>';
  if (showHonorar && c.honorarAmt > 0) {
    sumRows += '<div class="mp-sum-row"><span class="mp-sum-lbl">Гонорар</span><span class="mp-sum-val ca">'+fmt(c.honorarAmt)+'</span></div>';
  }
  sumRows +=
    '<div class="mp-sum-row"><span class="mp-sum-lbl">Бюджет клиента</span><span class="mp-sum-val cp">'+fmt(displayBudget)+'</span></div>' +
    '<div class="mp-sum-row"><span class="mp-sum-lbl">Нераспределённый остаток</span><span class="mp-sum-val '+(remaining>=0?'ca':'cr')+'">'+fmt(remaining)+'</span></div>';
  document.getElementById('mp-summary').innerHTML = '<div class="mp-summary">'+sumRows+'</div>';
}

async function shareMediaplan() {
  console.log('[share] start, mediaPlanProjId=', mediaPlanProjId);
  if (!mediaPlanProjId) return;
  var p = state.projects.find(function(x){return x.id===mediaPlanProjId;});
  console.log('[share] project found:', !!p, p && p.name);
  if (!p) return;
  var showHonor = document.getElementById('mp-show-honorar').checked ? '1' : '0';
  var btn = document.getElementById('mp-share-btn');
  var copied = document.getElementById('mp-copied');

  btn.disabled = true;
  btn.style.opacity = '0.6';
  var labelNode = btn.childNodes[0];
  var origText = labelNode.textContent;
  labelNode.textContent = '⏳ Сохранение...';

  try {
    var savedBid = localStorage.getItem('jsonbin_save_id') || undefined;
    console.log('[share] savedBid from localStorage:', savedBid);

    var payload = {key: 'project_' + p.id, data: p, bid: savedBid};
    console.log('[share] POST /api/save payload key:', payload.key, 'bid:', payload.bid);

    var res = await fetch('/api/save', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(payload)
    });
    console.log('[share] fetch response status:', res.status, res.ok);

    var json = await res.json();
    console.log('[share] response json:', json);

    if (!json.ok) {
      alert('Ошибка сохранения на сервер. Проверьте JSONBIN_MASTER_KEY в настройках Vercel.\n\nОтвет сервера: ' + JSON.stringify(json));
      return;
    }

    if (json.bin_id) localStorage.setItem('jsonbin_save_id', json.bin_id);
    console.log('[share] bin_id saved to localStorage:', json.bin_id);

    var base = location.href.replace(/[?#].*$/, '').replace(/index\.html$/, '');
    var url = base + 'mediaplan.html?id=' + mediaPlanProjId + '&bid=' + json.bin_id + '&sh=' + showHonor;
    console.log('[share] generated url:', url);

    // Always show the link via prompt so it can be copied on any device
    prompt('Ссылка на медиаплан (скопируй):', url);

    // Also try clipboard
    if (navigator.clipboard) {
      try {
        await navigator.clipboard.writeText(url);
        console.log('[share] copied to clipboard');
        copied.classList.add('show');
        setTimeout(function(){ copied.classList.remove('show'); }, 2500);
      } catch(clipErr) {
        console.warn('[share] clipboard write failed:', clipErr.message);
      }
    }
  } catch (e) {
    console.error('[share] error:', e);
    alert('Не удалось сохранить данные: ' + e.message);
  } finally {
    labelNode.textContent = origText;
    btn.disabled = false;
    btn.style.opacity = '';
  }
}

function flash(id){ var el=document.getElementById(id); if(!el) return; el.style.borderColor='var(--red)'; setTimeout(function(){el.style.borderColor='';},1000); }
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

document.getElementById('modal-project').addEventListener('click',function(e){if(e.target===this)closeProjModal();});
document.getElementById('modal-transfer').addEventListener('click',function(e){if(e.target===this)closeTransferModal();});
document.getElementById('modal-mediaplan').addEventListener('click',function(e){if(e.target===this)closeMediaplanModal();});
document.getElementById('modal-task').addEventListener('click',function(e){if(e.target===this)closeTaskModal();});

// ── TEAM ──────────────────────────────────────────────────────────────
var MEMBERS = [
  {slug:'zhenya',  name:'Женя',    role:'Владелец'},
  {slug:'dana',    name:'Даня',    role:'Менеджер'},
  {slug:'lesha',   name:'Лёша',    role:'Специалист'},
  {slug:'ruslana', name:'Руслана', role:'Специалист'}
];

var teamState    = {statuses:{}, tasks:[]};
var currentMember = null;
var editingTaskId = null;
var taskFilter    = 'all';

function loadTeamData() {
  try {
    var d = localStorage.getItem('pm_team_v1');
    if (d) teamState = JSON.parse(d);
  } catch(e) {}
  if (!teamState.statuses) teamState.statuses = {};
  if (!teamState.tasks)    teamState.tasks    = [];
  MEMBERS.forEach(function(m) {
    if (!teamState.statuses[m.slug])
      teamState.statuses[m.slug] = {status:'online', comment:'', updatedAt: new Date().toISOString()};
  });
}

function saveTeamData() { localStorage.setItem('pm_team_v1', JSON.stringify(teamState)); }

function initMember() {
  var p = new URLSearchParams(location.search).get('member');
  currentMember = MEMBERS.find(function(m){ return m.slug === p; }) ? p : null;
}

function getMemberObj(slug) { return MEMBERS.find(function(m){ return m.slug === slug; }); }
function getMemberName(slug) { var m = getMemberObj(slug); return m ? m.name : (slug || '—'); }

function isOwner() { return !currentMember || currentMember === 'zhenya'; }
function canEdit(slug) { return !currentMember || currentMember === slug || currentMember === 'zhenya'; }

function toggleMemberStatus(slug) {
  if (!canEdit(slug)) return;
  var st = teamState.statuses[slug];
  st.status    = st.status === 'online' ? 'away' : 'online';
  st.updatedAt = new Date().toISOString();
  saveTeamData();
  renderTeam();
}

function updateMemberComment(slug, val) {
  if (!canEdit(slug)) return;
  teamState.statuses[slug].comment   = val;
  teamState.statuses[slug].updatedAt = new Date().toISOString();
  saveTeamData();
}

function fmtRelTime(iso) {
  var diff = (Date.now() - new Date(iso).getTime()) / 1000;
  if (diff < 60)    return 'только что';
  if (diff < 3600)  return Math.floor(diff/60)+' мин назад';
  if (diff < 86400) return Math.floor(diff/3600)+' ч назад';
  return Math.floor(diff/86400)+' д назад';
}

// ── RENDER TEAM ───────────────────────────────────────────────────────
function renderTeam() {
  try { _renderTeam(); } catch(e) {
    var v = document.getElementById('view-team');
    if (v) v.innerHTML = '<div class="empty" style="color:var(--red)">Ошибка загрузки раздела: '+esc(String(e))+'</div>';
    console.error('renderTeam error:', e);
  }
}
function _renderTeam() {
  var view  = document.getElementById('view-team');
  var today = new Date().toISOString().slice(0,10);
  var now   = new Date();
  var nowH  = now.getHours() + now.getMinutes()/60;

  // tasks for plan-for-day block (my tasks due today)
  var myTodayTasks = teamState.tasks.filter(function(t) {
    var assigneeOk = currentMember ? t.assignee === currentMember : true;
    return assigneeOk && (t.deadline||'').slice(0,10) === today;
  });

  var goal     = 6;
  var cnt      = myTodayTasks.length;
  var goalMet  = cnt >= goal;
  var planStatus;
  if (goalMet)       planStatus = '<div class="plan-goal-met">🎉 Отлично! '+cnt+' задач на сегодня</div>';
  else if (nowH>=10) planStatus = '<div class="plan-goal-fail">⚠️ Только '+cnt+' из '+goal+' задач поставлено до 10:00</div>';
  else               planStatus = '<div class="plan-goal-pending">До 10:00 нужно ещё '+(goal-cnt)+' задач</div>';

  var planTasksHtml = myTodayTasks.length
    ? myTodayTasks.map(function(t) {
        var priEmoji = {high:'🔴',medium:'🟡',low:'🟢'}[t.priority]||'';
        var sLbl     = {new:'Новая',inprogress:'В работе',done:'Готово'}[t.status]||'';
        var dlTime   = t.deadline && t.deadline.length>10 ? t.deadline.slice(11,16) : '';
        return '<div class="plan-task'+(t.status==='done'?' task-done':'')+'">' +
          '<span class="plan-task-pri">'+priEmoji+'</span>' +
          '<span class="plan-task-title">'+(t.status==='done'?'<s>':'')+esc(t.title)+(t.status==='done'?'</s>':'')+'</span>' +
          (dlTime?'<span class="plan-task-time">'+dlTime+'</span>':'') +
          '<span class="plan-task-status">'+sLbl+'</span>' +
          (canEdit(t.assignee) ? '<button class="plan-task-done" onclick="cyclePlanTask(\''+t.id+'\')">'+(t.status==='done'?'↩':'✓')+'</button>' : '') +
        '</div>';
      }).join('')
    : '<div style="color:var(--text3);font-size:13px;padding:6px 0">Нет задач на сегодня</div>';

  var memberLabel = currentMember ? getMemberName(currentMember) : 'Команда';
  var planHtml = '<div class="plan-block">' +
    '<div class="plan-header">' +
      '<div class="plan-title">ПЛАН НА ДЕНЬ'+(currentMember?' — '+memberLabel:'')+'</div>' +
      '<div class="plan-date">'+now.toLocaleDateString('ru',{weekday:'long',day:'numeric',month:'long'})+'</div>' +
    '</div>' +
    '<div class="plan-goal">' + planStatus +
      '<div class="plan-progress-bar"><div class="plan-progress-fill" style="width:'+Math.min(100,cnt/goal*100)+'%"></div></div>' +
      '<div style="font-size:10px;color:var(--text3);margin-top:4px">'+cnt+' / '+goal+' задач</div>' +
    '</div>' +
    '<div class="plan-tasks">'+planTasksHtml+'</div>' +
  '</div>';

  // member status cards
  var cardsHtml = '<div class="team-section-title"><span>СТАТУСЫ КОМАНДЫ</span></div>' +
    '<div class="member-cards">' +
    MEMBERS.map(function(m) {
      var st       = teamState.statuses[m.slug] || {status:'online',comment:'',updatedAt:''};
      var online   = st.status === 'online';
      var editable = canEdit(m.slug);
      var relTime  = st.updatedAt ? fmtRelTime(st.updatedAt) : '';
      return '<div class="member-card '+(online?'mc-online':'mc-away')+'">' +
        '<div class="mc-top">' +
          '<div class="mc-info"><div class="mc-name">'+esc(m.name)+'</div><div class="mc-role">'+esc(m.role)+'</div></div>' +
          '<div class="mc-status-dot">'+(online?'🟢':'🔴')+'</div>' +
        '</div>' +
        '<div class="mc-status-lbl">'+(online?'На месте':'Отошёл')+'</div>' +
        (relTime?'<div class="mc-time">'+relTime+'</div>':'') +
        '<input type="text" class="mc-comment-inp" value="'+esc(st.comment)+'" placeholder="Комментарий..." '+
          (editable?'':'disabled ')+
          'onchange="updateMemberComment(\''+m.slug+'\',this.value)" onblur="updateMemberComment(\''+m.slug+'\',this.value)" />' +
        (editable
          ? '<button class="mc-toggle-btn '+(online?'mc-btn-away':'mc-btn-online')+'" onclick="toggleMemberStatus(\''+m.slug+'\')">'+
              (online?'🔴 Отошёл':'🟢 На месте')+'</button>'
          : '<div class="mc-toggle-btn mc-btn-disabled">'+(online?'🟢 На месте':'🔴 Отошёл')+'</div>'
        ) +
      '</div>';
    }).join('') +
    '</div>';

  // task list (filtered by member if not owner)
  var visTasks = currentMember && !isOwner()
    ? teamState.tasks.filter(function(t){ return t.assignee===currentMember||t.assigner===currentMember; })
    : teamState.tasks;
  visTasks = visTasks.slice().sort(function(a,b){
    if (a.deadline && b.deadline) { if(a.deadline<b.deadline)return -1; if(a.deadline>b.deadline)return 1; }
    else if (a.deadline) return -1;
    else if (b.deadline) return 1;
    var o={high:0,medium:1,low:2};
    return (o[a.priority]||1)-(o[b.priority]||1);
  });

  var tasksHtml = '<div class="team-section-title" style="margin-top:24px">' +
    '<span>ЗАДАЧИ</span>' +
    '<button class="add-btn" onclick="openTaskModal()" style="font-size:12px;padding:6px 14px">+ Новая задача</button>' +
  '</div>' +
  '<div class="task-filters" id="task-filters">' +
    '<button class="ftab'+(taskFilter==='all'?' active':'')+'" id="tf-all"        onclick="setTaskFilter(\'all\')">Все</button>' +
    '<button class="ftab'+(taskFilter==='new'?' active':'')+'" id="tf-new"        onclick="setTaskFilter(\'new\')">Новые</button>' +
    '<button class="ftab'+(taskFilter==='inprogress'?' active':'')+'" id="tf-inprogress" onclick="setTaskFilter(\'inprogress\')">В работе</button>' +
    '<button class="ftab'+(taskFilter==='done'?' active':'')+'" id="tf-done"      onclick="setTaskFilter(\'done\')">Готово</button>' +
  '</div>' +
  '<div id="task-list">' + renderTaskList(taskFilter==='all'?visTasks:visTasks.filter(function(t){return t.status===taskFilter;})) + '</div>';

  view.innerHTML = planHtml + cardsHtml + tasksHtml;
}

function setTaskFilter(f) {
  taskFilter = f;
  ['all','new','inprogress','done'].forEach(function(k){
    var el = document.getElementById('tf-'+k);
    if (el) el.classList.toggle('active', k===f);
  });
  var me = currentMember;
  var vis = me && !isOwner()
    ? teamState.tasks.filter(function(t){ return t.assignee===me||t.assigner===me; })
    : teamState.tasks;
  var filtered = f==='all' ? vis : vis.filter(function(t){ return t.status===f; });
  var tl = document.getElementById('task-list');
  if (tl) tl.innerHTML = renderTaskList(filtered);
}

function renderTaskList(tasks) {
  if (!tasks || !tasks.length) return '<div class="empty">Нет задач</div>';
  var today = new Date().toISOString().slice(0,10);
  var nowMs = Date.now();
  return tasks.map(function(t) {
    var priEmoji  = {high:'🔴',medium:'🟡',low:'🟢'}[t.priority]||'';
    var sLbl      = {new:'Новая',inprogress:'В работе',done:'Готово'}[t.status]||'';
    var sCls      = {new:'ts-new',inprogress:'ts-inprogress',done:'ts-done'}[t.status]||'';
    var dlStr     = t.deadline ? new Date(t.deadline).toLocaleString('ru',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}) : '—';
    var isToday   = (t.deadline||'').slice(0,10)===today;
    var isOverdue = t.deadline && new Date(t.deadline).getTime() < nowMs && t.status!=='done';
    var repeatStr = t.repeat ? '🔁 '+( t.reminderTime||'' ) : '';
    var editable  = canEdit(t.assignee) || canEdit(t.assigner);
    var rowCls    = 'task-row'+(t.status==='done'?' task-row-done':'')+(isOverdue?' task-overdue':(isToday&&t.status!=='done'?' task-today':''));

    return '<div class="'+rowCls+'">' +
      '<div class="task-row-main">' +
        '<div class="task-row-left">' +
          '<span class="task-pri-badge">'+priEmoji+'</span>' +
          '<span class="task-title">'+(t.status==='done'?'<s>':'')+esc(t.title)+(t.status==='done'?'</s>':'')+'</span>' +
        '</div>' +
        '<div class="task-row-right">' +
          '<span class="task-badge '+sCls+'">'+sLbl+'</span>' +
          (editable?'<button class="act a-edit" onclick="openTaskModal(\''+t.id+'\')" style="font-size:10px;padding:3px 8px">✎</button>':'') +
          (editable?'<button class="act a-del"  onclick="deleteTask(\''+t.id+'\')"   style="font-size:10px;padding:3px 8px">✕</button>':'') +
        '</div>' +
      '</div>' +
      '<div class="task-row-meta">' +
        '<span class="task-meta-item">👤 '+esc(getMemberName(t.assignee))+'</span>' +
        '<span class="task-meta-item">↳ от '+esc(getMemberName(t.assigner))+'</span>' +
        '<span class="task-meta-item'+(isOverdue?' cr':(isToday&&t.status!=='done'?' ca':''))+'">🗓 '+dlStr+'</span>' +
        (repeatStr?'<span class="task-meta-item">'+repeatStr+'</span>':'') +
        (t.comment?'<span class="task-meta-item" style="color:var(--text3)">💬 '+esc(t.comment)+'</span>':'') +
      '</div>' +
      (editable?'<div class="task-status-btns">' +
        ['new','inprogress','done'].map(function(s){
          var lbl={new:'Новая',inprogress:'В работе',done:'Готово'}[s];
          return '<button class="task-status-btn'+(t.status===s?' tsb-active':'')+'" onclick="setTaskStatus(\''+t.id+'\',\''+s+'\')">'+lbl+'</button>';
        }).join('')+
      '</div>':'') +
    '</div>';
  }).join('');
}

function cyclePlanTask(id) {
  var t = teamState.tasks.find(function(x){ return x.id===id; });
  if (!t) return;
  t.status = {new:'inprogress',inprogress:'done',done:'new'}[t.status]||'new';
  saveTeamData(); renderTeam();
}

function setTaskStatus(id, status) {
  var t = teamState.tasks.find(function(x){ return x.id===id; });
  if (!t) return;
  t.status = status;
  saveTeamData(); renderTeam();
}

function deleteTask(id) {
  if (!confirm('Удалить задачу?')) return;
  teamState.tasks = teamState.tasks.filter(function(x){ return x.id!==id; });
  saveTeamData(); renderTeam();
}

// ── TASK MODAL ────────────────────────────────────────────────────────
function openTaskModal(taskId) {
  editingTaskId = taskId || null;
  document.getElementById('modal-task-title').textContent = taskId ? 'Редактировать задачу' : 'Новая задача';
  if (taskId) {
    var t = teamState.tasks.find(function(x){ return x.id===taskId; });
    if (!t) return;
    document.getElementById('t-title').value    = t.title;
    document.getElementById('t-assignee').value = t.assignee;
    document.getElementById('t-assigner').value = t.assigner;
    document.getElementById('t-deadline').value = t.deadline||'';
    document.getElementById('t-priority').value = t.priority;
    document.getElementById('t-comment').value  = t.comment||'';
    document.getElementById('t-status').value   = t.status;
    document.getElementById('t-repeat').checked = !!t.repeat;
    document.getElementById('t-reminder').value = t.reminderTime||'09:00';
    document.getElementById('t-reminder-row').style.display = t.repeat?'':'none';
  } else {
    document.getElementById('t-title').value    = '';
    document.getElementById('t-assignee').value = currentMember||'zhenya';
    document.getElementById('t-assigner').value = currentMember||'zhenya';
    var dl = new Date(); dl.setMinutes(0,0,0);
    document.getElementById('t-deadline').value = dl.toISOString().slice(0,16);
    document.getElementById('t-priority').value = 'medium';
    document.getElementById('t-comment').value  = '';
    document.getElementById('t-status').value   = 'new';
    document.getElementById('t-repeat').checked = false;
    document.getElementById('t-reminder').value = '09:00';
    document.getElementById('t-reminder-row').style.display = 'none';
  }
  document.getElementById('modal-task').classList.add('open');
  setTimeout(function(){ document.getElementById('t-title').focus(); }, 60);
}

function closeTaskModal() {
  document.getElementById('modal-task').classList.remove('open');
  editingTaskId = null;
}

function saveTask() {
  var title = document.getElementById('t-title').value.trim();
  if (!title) { flash('t-title'); return; }
  var data = {
    title:        title,
    assignee:     document.getElementById('t-assignee').value,
    assigner:     document.getElementById('t-assigner').value,
    deadline:     document.getElementById('t-deadline').value,
    priority:     document.getElementById('t-priority').value,
    comment:      document.getElementById('t-comment').value.trim(),
    status:       document.getElementById('t-status').value,
    repeat:       document.getElementById('t-repeat').checked,
    reminderTime: document.getElementById('t-reminder').value
  };
  if (editingTaskId) {
    var t = teamState.tasks.find(function(x){ return x.id===editingTaskId; });
    if (t) Object.assign(t, data);
  } else {
    data.id        = 'tk'+Date.now();
    data.createdAt = new Date().toISOString();
    teamState.tasks.unshift(data);
  }
  saveTeamData(); closeTaskModal(); renderTeam();
}

render();
initMember();
loadTeamData();
